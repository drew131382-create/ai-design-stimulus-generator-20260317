services:
  - type: web
    name: ai-design-stimulus-generator-api
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: "10000"
