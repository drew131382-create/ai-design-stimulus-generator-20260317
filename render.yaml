services:
  - type: web
    name: ai-design-stimulus-generator-api
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MODELSCOPE_SDK_TOKEN
        sync: false
      - key: MODELSCOPE_BASE_URL
        value: "https://api-inference.modelscope.cn/v1"
      - key: MODELSCOPE_MODEL
        value: "Qwen/Qwen3-8B,Qwen/Qwen3-1.7B,deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: "10000"
